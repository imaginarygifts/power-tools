<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bulk Image Resizer</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h2>Bulk Image Resizer</h2>

<input type="file" id="upload" multiple accept="image/*">

<select id="resolution">
<option value="1280">HD (1280)</option>
<option value="1920">Full HD (1920)</option>
<option value="2560">QHD (2560)</option>
<option value="3840">4K (3840)</option>
</select>

<input type="text" id="prefix" placeholder="File prefix">

<button onclick="processImages()">Resize Images</button>

<div id="preview"></div>

<script src="script.js"></script>

</body>
</html>
